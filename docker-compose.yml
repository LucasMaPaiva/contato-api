x-backend-service: &backend-base
  build:
    context: .
    dockerfile: .docker/Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  environment:
    - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/contato}
    - PORT=${PORT:-3001}

services:
  backend:
    <<: *backend-base
    profiles: ["local", "dev", "hml"]
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      mongodb:
        condition: service_healthy

  backend-proxy:
    <<: *backend-base
    profiles: ["prod"]
    networks:
      - default
      - proxy_network

  mongodb:
    image: mongo:4.4.18
    profiles: ["local", "dev", "hml"]
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:

networks:
  proxy_network:
    external: true
